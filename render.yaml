services:
  - type: web
    name: tiktok-shop-analyzer
    runtime: python
    buildCommand: apt-get install -y ffmpeg && pip install -r requirements.txt
    startCommand: python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        value: dopeventures44@gmail.com
