<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Partage ton avis sur Qeerah.">
  <title>Donne ton avis — Qeerah</title>
  <link rel="manifest" href="/static/manifest.json">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --primary:#D4AF37; --accent:#2563EB; --bg:#F5F7FA; --surface:#FFFFFF; --surface2:#EEF1F6; --text:#1A1A1A; --muted:#6B7280; --border:#E5E7EB; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
    header { padding:14px 20px; border-bottom:1px solid var(--border); background:#fff; }
    .logo { font-size:17px; font-weight:800; color:var(--text); text-decoration:none; } .logo span{ color:var(--primary); }
    main { max-width:560px; margin:0 auto; padding:36px 20px 80px; }
    h1 { font-size:26px; font-weight:800; margin-bottom:6px; }
    .sub { color:var(--muted); font-size:14px; margin-bottom:24px; }
    label { font-size:13px; font-weight:700; display:block; margin:14px 0 4px; }
    input, textarea { width:100%; padding:11px 13px; border:1px solid var(--border); border-radius:10px; font-size:14px; background:#fff; color:var(--text); }
    textarea { resize:vertical; }
    .stars { font-size:26px; cursor:pointer; user-select:none; }
    .stars span { opacity:.3; transition:opacity .1s; } .stars span.on { opacity:1; }
    .btn { width:100%; margin-top:20px; padding:13px; border:none; border-radius:12px; background:var(--accent); color:#fff; font-weight:700; font-size:15px; cursor:pointer; }
    .ok { text-align:center; padding:40px 20px; }
    .ok .big { font-size:42px; }
    .hint { font-size:12px; color:var(--muted); margin-top:4px; }
  </style>
  <script src="/static/qeerah-consent.js" defer></script>
</head>
<body>
  <header><a class="logo" href="/">Qeerah</a></header>
  <main>
    <div id="form-wrap">
      <h1>Ton avis compte 🙏</h1>
      <p class="sub">Partage ton expérience — ça aide d'autres créateurs à se lancer. Publié après validation.</p>

      <label for="t-nom">Ton nom / pseudo *</label>
      <input id="t-nom" type="text" maxlength="80" placeholder="Ex: Julie K.">

      <label for="t-tiktok">Ton profil TikTok (optionnel)</label>
      <input id="t-tiktok" type="url" placeholder="https://www.tiktok.com/@tonpseudo">
      <div class="hint">Affiché publiquement comme lien vers ton profil.</div>

      <label for="t-texte">Ton témoignage *</label>
      <textarea id="t-texte" rows="5" maxlength="1000" placeholder="Ce que l'outil t'a apporté, un résultat concret…"></textarea>

      <label>Note (optionnel)</label>
      <div class="stars" id="t-stars">
        <span data-n="1">★</span><span data-n="2">★</span><span data-n="3">★</span><span data-n="4">★</span><span data-n="5">★</span>
      </div>

      <button class="btn" id="t-submit" onclick="submitAvis()">Envoyer mon avis →</button>
    </div>

    <div id="ok-wrap" class="ok" style="display:none">
      <div class="big">🎉</div>
      <h1>Merci !</h1>
      <p class="sub">Ton avis a bien été envoyé. Il sera publié après une rapide validation.</p>
      <a class="btn" href="/" style="display:inline-block;text-decoration:none;max-width:220px">Retour à l'accueil</a>
    </div>
  </main>

  <script>
    var note = 0;
    document.querySelectorAll('#t-stars span').forEach(function (s) {
      s.onclick = function () {
        note = parseInt(s.getAttribute('data-n'));
        document.querySelectorAll('#t-stars span').forEach(function (x) {
          x.classList.toggle('on', parseInt(x.getAttribute('data-n')) <= note);
        });
      };
    });
    // Pré-remplissage du nom depuis ?nom=
    try {
      var p = new URLSearchParams(location.search);
      if (p.get('nom')) document.getElementById('t-nom').value = p.get('nom');
    } catch (e) {}

    async function submitAvis() {
      var nom = document.getElementById('t-nom').value.trim();
      var texte = document.getElementById('t-texte').value.trim();
      if (!nom || texte.length < 10) { alert('Renseigne ton nom et un témoignage (au moins 10 caractères).'); return; }
      var btn = document.getElementById('t-submit'); btn.disabled = true; btn.textContent = 'Envoi…';
      try {
        var r = await fetch('/api/temoignages', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nom: nom, texte: texte, lien_tiktok: document.getElementById('t-tiktok').value.trim(), note: note || null })
        });
        var d = await r.json().catch(function () { return {}; });
        if (!r.ok) { alert('❌ ' + (d.detail || 'Erreur')); btn.disabled = false; btn.textContent = 'Envoyer mon avis →'; return; }
        document.getElementById('form-wrap').style.display = 'none';
        document.getElementById('ok-wrap').style.display = 'block';
      } catch (e) { alert('Erreur réseau.'); btn.disabled = false; btn.textContent = 'Envoyer mon avis →'; }
    }
  </script>
</body>
</html>
